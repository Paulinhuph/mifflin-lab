<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="assets/favicon.ico" type="image/png">
    <title>GET E TMB | CALCULADORA</title>
</head>
<body> 
    <header class="marca-topo">
        <h1>Equação de Mifflin-St. Jeor</h1>
    </header>
    
    <main>
        <section id="painel-entrada">
    <header class="header-interno">
        <h1>CÁLCULO DE TMB E GET</h1>
        <p>Parâmetros biométricos para engenharia metabólica.</p>
    </header>

    <form id="formulario-saude">
        <div class="input-group">
            <label><i class="fas fa-venus-mars"></i> Gênero</label>
            <div class="gender-selector">
                <button type="button" class="btn-gender active" data-gender="masculino">Masculino</button>
                <button type="button" class="btn-gender" data-gender="feminino">Feminino</button>
            </div>
        </div>

        <div class="grid-duplo">
            <div class="input-group">
                <label><i class="fas fa-calendar-alt"></i> Idade</label>
                <div class="input-wrapper">
                    <input type="number" id="idade" placeholder="25">
                    <span class="unit">anos</span>
                </div>
            </div>

            <div class="input-group">
                <label><i class="fas fa-ruler-vertical"></i> Altura</label>
                <div class="input-wrapper">
                    <input type="number" id="altura" placeholder="175">
                    <span class="unit">cm</span>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label><i class="fas fa-weight"></i> Peso</label>
            <div class="input-wrapper">
                <input type="number" id="peso" placeholder="70">
                <span class="unit">kg</span>
            </div>
        </div>

        <div class="input-group">
            <label><i class="fas fa-running"></i> Nível de Atividade</label>
            <div class="select-wrapper">
                <select id="atividade">
                    <option value="1.2">Sedentário (nenhum exercício)</option>
                    <option value="1.375">Levemente ativo (1-2 dias/semana)</option>
                    <option value="1.55" selected>Moderadamente ativo (3-5 dias/semana)</option>
                    <option value="1.725">Muito ativo (6-7 dias/semana)</option>
                    <option value="1.9">Super ativo (2x por dia)</option>
                </select>
            </div>
        </div>

        <button type="submit" id="btn-calcular">Calcular Gasto Calórico</button>
    </form>
</section>

<section id="resultado">
    <div class="resultado-box">
        <span class="label-resultado">Gasto Energético Total (GET)</span>
        <div class="valor-principal">
            <span id="get-valor">0</span>
            <small>kcal / dia</small>
        </div>
    </div>

    <div class="divider"></div>
    <div class="divider"></div>
    <div class="divider"></div>
    
    <div class="resultado-secundario">
        <div class="divider"></div>
        <span class="label-resultado">Taxa Metabólica Basal (TMB)</span>
        <div class="valor-tmb">
            <span id="tmb-valor">0</span>
            <small>kcal</small>
        </div>
    </div>
</section>
<footer class="footer">© 2026 • <span class="footer-nome">Paulo Henrique</span></footer>
    </main>
<script src="script.js"></script>

</body>
</html>
